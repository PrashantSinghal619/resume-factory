name: Compile Resume

on:
  push:
    paths:
      - 'output/tex/*.tex'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Find most recently modified TEX file
        id: find_tex
        run: |
          TEX=$(find output/tex -name "*.tex" -printf '%T@ %p\n' \
            | sort -rn \
            | head -1 \
            | cut -d' ' -f2-)
          echo "tex_file=$TEX" >> $GITHUB_OUTPUT
          echo "Found: $TEX"

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v2
        with:
          root_file: ${{ steps.find_tex.outputs.tex_file }}

      - name: Move PDF to output/pdf
        run: |
          mkdir -p output/pdf
          find output/tex -name "*.pdf" -exec mv {} output/pdf/ \;

      - name: Commit PDF back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/pdf/*.pdf
          git commit -m "Compile PDF: $(ls output/pdf/*.pdf | xargs -n1 basename)" || echo "No changes"
          git push
