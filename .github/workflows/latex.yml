name: Compile Resume

on:
  push:
    paths:
      - 'output/tex/*.tex'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Find most recently modified TEX file
        id: find_tex
        run: |
          TEX=$(find output/tex -name "*.tex" -printf '%T@ %p\n' \
            | sort -rn \
            | head -1 \
            | cut -d' ' -f2-)
          # Derive expected PDF name from TEX name
          BASENAME=$(basename "$TEX" .tex)
          echo "tex_file=$TEX" >> $GITHUB_OUTPUT
          echo "pdf_name=${BASENAME}.pdf" >> $GITHUB_OUTPUT
          echo "TEX: $TEX"
          echo "Expected PDF: ${BASENAME}.pdf"

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v2
        with:
          root_file: ${{ steps.find_tex.outputs.tex_file }}

      - name: Move PDF to output/pdf
        run: |
          mkdir -p output/pdf
          PDF_NAME="${{ steps.find_tex.outputs.pdf_name }}"
          # Find the compiled PDF by exact name, wherever latexmk dropped it
          find . -name "$PDF_NAME" ! -path "./output/pdf/*" -exec mv {} output/pdf/ \;
          echo "=== output/pdf ==="
          ls -la output/pdf/

      - name: Commit PDF back to repo
        run: |
          PDF_PATH="output/pdf/${{ steps.find_tex.outputs.pdf_name }}"
          if [ ! -f "$PDF_PATH" ]; then
            echo "Error: Expected PDF not found at $PDF_PATH"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$PDF_PATH"
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Compile PDF: ${{ steps.find_tex.outputs.pdf_name }}"
            git push
          fi
